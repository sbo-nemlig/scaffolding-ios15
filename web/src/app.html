<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Macro-powered SwiftUI navigation. Define routes as functions. Get type-safe destinations for free." />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#000000" />
    <title>Scaffolding — Macro-powered SwiftUI navigation</title>
    <script>
      // Resolve theme synchronously before first paint.
      (function () {
        try {
          var stored = localStorage.getItem('scaffolding-theme');
          var prefersLight = window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = stored || (prefersLight ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (_) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
