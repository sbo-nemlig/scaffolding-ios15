name: ScaffoldingDemo
options:
  bundleIdPrefix: com.scaffolding
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"
packages:
  Scaffolding:
    path: ../../
targets:
  ScaffoldingDemo:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: Scaffolding
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.scaffolding.demo
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
