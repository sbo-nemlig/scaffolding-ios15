name: Deploy site (Svelte + DocC) to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build Svelte site
        working-directory: web
        env:
          BASE_PATH: /scaffolding
        run: npm run build

      - name: Stage Svelte build at the Pages root
        run: |
          mkdir -p ./docs
          cp -R web/build/. ./docs/

      - name: Build DocC into /scaffolding/docc/
        run: |
          mkdir -p ./docs/docc
          swift package --allow-writing-to-directory ./docs/docc \
            generate-documentation \
            --target Scaffolding \
            --output-path ./docs/docc \
            --transform-for-static-hosting \
            --hosting-base-path scaffolding/docc

      # The Pages artifact now contains:
      #   /                              → Svelte landing & docs pages
      #   /docc/documentation/scaffolding/ → DocC archive

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
